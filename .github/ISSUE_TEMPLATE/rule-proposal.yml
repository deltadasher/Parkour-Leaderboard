name: Rule proposal
description: Propose a specific, reviewable rules change.
title: "[PROPOSAL] Short rule change"
body:
  - type: textarea
    id: problem
    attributes: { label: Problem being solved }
    validations: { required: true }
  - type: textarea
    id: text
    attributes: { label: Suggested rule text }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes: { label: Evidence or examples }
    validations: { required: true }
  - type: textarea
    id: abuse
    attributes: { label: Possible abuse cases and tradeoffs }
    validations: { required: true }
